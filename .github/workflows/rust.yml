name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-dev libasound2-dev libx11-dev libxkbcommon-dev libwayland-dev libclang-dev clang ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev
        
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: clippy, rustfmt
        
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Clippy Lints
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run Tests
      run: cargo test --verbose
      
    - name: Build Release
      run: cargo build --release