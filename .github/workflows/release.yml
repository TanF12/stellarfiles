name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-debian:
    name: Build Debian/Pop!_OS Package (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libasound2-dev libx11-dev libxkbcommon-dev libwayland-dev libclang-dev clang ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavfilter-dev libavdevice-dev libswresample-dev pkg-config

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb

      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/debian/*.deb

  build-arch:
    name: Build Arch Linux Package (.pkg.tar.zst)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Update System & Install Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git rust cargo clang pkgconf ffmpeg

      - name: Build PKGBUILD as non-root user
        run: |
          git clone https://aur.archlinux.org/stellarfiles-git aur-build
          
          useradd -m builduser
          chown -R builduser:builduser aur-build
          
          cd aur-build
          su builduser -c "makepkg -s --noconfirm"
          mv *.pkg.tar.zst ../

      - name: Upload .pkg.tar.zst to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.pkg.tar.zst"